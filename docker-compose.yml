services:
  db:
    image: postgis/postgis:16-3.4-alpine
    command: >
      postgres
      -c shared_buffers=32MB
      -c max_wal_size=64MB
      -c checkpoint_timeout=30s
      -c checkpoint_completion_target=0.9
      -c work_mem=4MB
      -c synchronous_commit=off
      -c wal_writer_delay=200ms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transit_tracker
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d transit_tracker']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7.2-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - cache_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/transit_tracker
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/transit_tracker
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      WORKER_FILE_LIVENESS_PATH: /tmp/worker-alive
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=300'
      GTFS_INGEST_ON_STARTUP: ${GTFS_INGEST_ON_STARTUP:-false}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'test -f /tmp/worker-alive || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3000
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  db_data:
  cache_data:
