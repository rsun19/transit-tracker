services:
  db:
    image: postgis/postgis:16-3.4-alpine
    command: >
      postgres
      -c shared_buffers=32MB
      -c max_wal_size=64MB
      -c checkpoint_timeout=30s
      -c checkpoint_completion_target=0.9
      -c work_mem=4MB
      -c synchronous_commit=off
      -c wal_writer_delay=200ms
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7.2-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - cache_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Microservices ──────────────────────────────────────────────

  agencies:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-agencies:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/agencies/Dockerfile
    environment:
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      NODE_ENV: production
      PORT: 3001
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  routes:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-routes:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/routes/Dockerfile
    environment:
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      NODE_ENV: production
      PORT: 3002
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  stops:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-stops:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/stops/Dockerfile
    environment:
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      NODE_ENV: production
      PORT: 3003
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3003/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  alerts:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-alerts:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/alerts/Dockerfile
    environment:
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      NODE_ENV: production
      PORT: 3004
    env_file:
      - .env
    depends_on:
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3004/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  vehicles:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-vehicles:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/vehicles/Dockerfile
    environment:
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      NODE_ENV: production
      PORT: 3005
    env_file:
      - .env
    depends_on:
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3005/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ingestion:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-ingestion:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      WORKER_FILE_LIVENESS_PATH: /tmp/worker-alive
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=300'
      GTFS_INGEST_ON_STARTUP: ${GTFS_INGEST_ON_STARTUP:-false}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'test -f /tmp/worker-alive || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────

  frontend:
    image: ghcr.io/${REGISTRY_OWNER:-local}/transit-tracker-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_URL: http://nginx:80
    environment:
      NODE_ENV: production
      BACKEND_URL: http://nginx:80
      HOSTNAME: '0.0.0.0'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Reverse Proxy ──────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      agencies:
        condition: service_healthy
      routes:
        condition: service_healthy
      stops:
        condition: service_healthy
      alerts:
        condition: service_healthy
      vehicles:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://agencies:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: ['/bin/sh']
    command: ['-c', 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $$!; done']
    restart: unless-stopped

volumes:
  db_data:
  cache_data:
  certbot_certs:
  certbot_webroot:
