worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone: 1 request/second per IP, 10MB zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=1r/s;

    # Custom 429 response
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        # API proxy with rate limiting
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            # Return JSON on rate limit exceeded
            error_page 429 = @rate_limit_json;

            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health endpoint (not rate limited)
        location /health {
            proxy_pass http://backend:3000/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend proxy
        location / {
            proxy_pass http://frontend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js hot reload (dev only)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Named location for rate limit JSON response
        location @rate_limit_json {
            default_type application/json;
            return 429 '{"error":"Rate limit exceeded","statusCode":429}';
        }
    }
}
