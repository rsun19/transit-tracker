worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone: 1 request/second per IP, 10MB zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=1r/s;

    # Custom 429 response
    limit_req_status 429;

    # Use Docker's internal DNS resolver so upstream hostnames are re-resolved
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP: ACME challenge + redirect to HTTPS
    server {
        listen 80;
        server_name trackthemetro.com www.trackthemetro.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://www.trackthemetro.com$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name trackthemetro.com www.trackthemetro.com;

        ssl_certificate /etc/letsencrypt/live/www.trackthemetro.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.trackthemetro.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # ── API Route Map ──────────────────────────────────────────────
        # Stops
        location /api/v1/stops {
            limit_req zone=api burst=10 nodelay;
            error_page 429 = @rate_limit_json;
            proxy_pass http://stops:3003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Routes
        location /api/v1/routes {
            limit_req zone=api burst=10 nodelay;
            error_page 429 = @rate_limit_json;
            proxy_pass http://routes:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Trips
        location /api/v1/trips {
            limit_req zone=api burst=10 nodelay;
            error_page 429 = @rate_limit_json;
            proxy_pass http://routes:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Alerts
        location /api/v1/alerts {
            limit_req zone=api burst=10 nodelay;
            error_page 429 = @rate_limit_json;
            proxy_pass http://alerts:3004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vehicles
        location /api/v1/vehicles {
            limit_req zone=api burst=10 nodelay;
            error_page 429 = @rate_limit_json;
            proxy_pass http://vehicles:3005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agencies
        location /api/v1/agencies {
            limit_req zone=api burst=10 nodelay;
            error_page 429 = @rate_limit_json;
            proxy_pass http://agencies:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health endpoint (not rate limited) — checks agencies as representative
        location /health {
            set $health_upstream http://agencies:3001;
            proxy_pass $health_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend proxy
        location / {
            set $frontend_upstream http://frontend:3001;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Named location for rate limit JSON response
        location @rate_limit_json {
            default_type application/json;
            return 429 '{"error":"Rate limit exceeded","statusCode":429}';
        }
    }
}
