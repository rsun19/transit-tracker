services:
  db:
    image: postgis/postgis:16-3.4-alpine
    command: >
      postgres
      -c shared_buffers=32MB
      -c max_wal_size=64MB
      -c checkpoint_timeout=30s
      -c checkpoint_completion_target=0.9
      -c work_mem=4MB
      -c synchronous_commit=off
      -c wal_writer_delay=200ms
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7.2-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  agencies:
    build:
      context: .
      dockerfile: services/agencies/Dockerfile
      target: development
    volumes:
      - ./services/agencies:/app/services/agencies
      - /app/services/agencies/node_modules
      - ./packages/shared:/app/packages/shared
      - ./config:/app/config
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    env_file:
      - .env
    environment:
      NODE_ENV: development
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      PORT: 3001
    depends_on:
      cache:
        condition: service_healthy
    command: npm run start:dev

  routes:
    build:
      context: .
      dockerfile: services/routes/Dockerfile
      target: development
    volumes:
      - ./services/routes:/app/services/routes
      - /app/services/routes/node_modules
      - ./packages/shared:/app/packages/shared
      - ./config:/app/config
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/transit_tracker
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      PORT: 3002
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: npm run start:dev

  stops:
    build:
      context: .
      dockerfile: services/stops/Dockerfile
      target: development
    volumes:
      - ./services/stops:/app/services/stops
      - /app/services/stops/node_modules
      - ./packages/shared:/app/packages/shared
      - ./config:/app/config
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/transit_tracker
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      PORT: 3003
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: npm run start:dev

  alerts:
    build:
      context: .
      dockerfile: services/alerts/Dockerfile
      target: development
    volumes:
      - ./services/alerts:/app/services/alerts
      - /app/services/alerts/node_modules
      - ./packages/shared:/app/packages/shared
      - ./config:/app/config
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      PORT: 3004
    depends_on:
      cache:
        condition: service_healthy
    command: npm run start:dev

  vehicles:
    build:
      context: .
      dockerfile: services/vehicles/Dockerfile
      target: development
    volumes:
      - ./services/vehicles:/app/services/vehicles
      - /app/services/vehicles/node_modules
      - ./packages/shared:/app/packages/shared
      - ./config:/app/config
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
      PORT: 3005
    depends_on:
      cache:
        condition: service_healthy
    command: npm run start:dev

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
      target: development
    volumes:
      - ./services/ingestion:/app/services/ingestion
      - /app/services/ingestion/node_modules
      - ./packages/shared:/app/packages/shared
      - ./config:/app/config
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/transit_tracker
      REDIS_URL: redis://cache:6379
      AGENCY_CONFIG_PATH: /app/config/agencies.json
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: npm run start:dev

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '3000:80'
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      BACKEND_URL: http://nginx:80
    ports:
      - '3001:3001'
    depends_on:
      - nginx
    command: npm run dev

volumes:
  db_data:
