name: Backend Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ruff:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: |
          # Lint the backend package; fail the workflow if issues found
          ruff check backend

  tests:
    name: Run backend tests
    runs-on: ubuntu-latest
    needs: ruff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No requirements.txt case: attempt editable install from backend if pyproject.toml exists
          if [ -f backend/pyproject.toml ]; then
            pip install -e backend
          else
            echo "No pyproject.toml in backend/; proceeding without installing backend deps"
          fi

      - name: Run backend Django tests
        working-directory: backend/mbta-server
        run: |
          python manage.py test
