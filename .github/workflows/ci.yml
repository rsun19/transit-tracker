name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run typecheck

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run test:unit

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm run test:integration

  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm run test:contract

  accessibility:
    name: accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run test:a11y

  performance:
    name: performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:performance

  cypress-map:
    name: cypress-map
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm --prefix frontend run dev > frontend-dev.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:3001 >/dev/null && exit 0
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1
      - run: node scripts/ci/ensure-cypress-tests-found.mjs map
      - run: node scripts/ci/ensure-cypress-min-scenarios.mjs
      - run: CYPRESS_GROUP=map node scripts/e2e/run-cypress-group.mjs --group=map
      - name: Cypress summary
        if: always()
        run: |
          {
            echo "### cypress-map"
            echo "- Group: map"
            echo "- Guard: ensure-cypress-tests-found"
            echo "- Guard: ensure-cypress-min-scenarios"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Cypress artifacts (map)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-map-artifacts
          path: |
            cypress/videos/**
            cypress/screenshots/**
            frontend-dev.log

  cypress-stops:
