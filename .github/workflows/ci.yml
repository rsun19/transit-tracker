name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run typecheck

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run test:unit

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm run test:integration

  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm run test:contract

  accessibility:
    name: accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run test:a11y

  performance:
    name: performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:performance

  cypress-map:
    name: cypress-map
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: CYPRESS=true npm --prefix frontend run dev > frontend-dev.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:3001 >/dev/null && exit 0
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1
      - run: node scripts/ci/ensure-cypress-tests-found.mjs map
      - run: node scripts/ci/ensure-cypress-min-scenarios.mjs
      - run: CYPRESS_GROUP=map node scripts/e2e/run-cypress-group.mjs --group=map
      - name: Cypress summary
        if: always()
        run: |
          {
            echo "### cypress-map"
            echo "- Group: map"
            echo "- Guard: ensure-cypress-tests-found"
            echo "- Guard: ensure-cypress-min-scenarios"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Cypress artifacts (map)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-map-artifacts
          path: |
            cypress/videos/**
            cypress/screenshots/**
            frontend-dev.log

  cypress-stops:
    name: cypress-stops
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: CYPRESS=true npm --prefix frontend run dev > frontend-dev.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:3001 >/dev/null && exit 0
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1
      - run: node scripts/ci/ensure-cypress-tests-found.mjs stops
      - run: node scripts/ci/ensure-cypress-min-scenarios.mjs
      - run: CYPRESS_GROUP=stops node scripts/e2e/run-cypress-group.mjs --group=stops
      - name: Cypress summary
        if: always()
        run: |
          {
            echo "### cypress-stops"
            echo "- Group: stops"
            echo "- Guard: ensure-cypress-tests-found"
            echo "- Guard: ensure-cypress-min-scenarios"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Cypress artifacts (stops)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-stops-artifacts
          path: |
            cypress/videos/**
            cypress/screenshots/**
            frontend-dev.log

  cypress-routes:
    name: cypress-routes
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: CYPRESS=true npm --prefix frontend run dev > frontend-dev.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:3001 >/dev/null && exit 0
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1
      - run: node scripts/ci/ensure-cypress-tests-found.mjs routes
      - run: node scripts/ci/ensure-cypress-min-scenarios.mjs
      - run: CYPRESS_GROUP=routes node scripts/e2e/run-cypress-group.mjs --group=routes
      - name: Cypress summary
        if: always()
        run: |
          {
            echo "### cypress-routes"
            echo "- Group: routes"
            echo "- Guard: ensure-cypress-tests-found"
            echo "- Guard: ensure-cypress-min-scenarios"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Cypress artifacts (routes)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-routes-artifacts
          path: |
            cypress/videos/**
            cypress/screenshots/**
            frontend-dev.log

  cypress-core-smoke:
    name: cypress-core-smoke
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: CYPRESS=true npm --prefix frontend run dev > frontend-dev.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:3001 >/dev/null && exit 0
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1
      - run: node scripts/ci/ensure-cypress-tests-found.mjs core-smoke
      - run: node scripts/ci/ensure-cypress-min-scenarios.mjs
      - run: CYPRESS_GROUP=core-smoke node scripts/e2e/run-cypress-group.mjs --group=core-smoke
      - name: Cypress summary
        if: always()
        run: |
          {
            echo "### cypress-core-smoke"
            echo "- Group: core-smoke"
            echo "- Guard: ensure-cypress-tests-found"
            echo "- Guard: ensure-cypress-min-scenarios"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Cypress artifacts (core-smoke)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-core-smoke-artifacts
          path: |
            cypress/videos/**
            cypress/screenshots/**
            frontend-dev.log

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-main
      cancel-in-progress: true
    needs:
      - lint
      - typecheck
      - unit
      - integration
      - contract
      - accessibility
      - performance
      - cypress-map
      - cypress-stops
      - cypress-routes
      - cypress-core-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: production
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/transit-tracker-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.worker
          target: production
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/transit-tracker-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: production
          build-args: BACKEND_URL=http://backend:3000
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/transit-tracker-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml,nginx.conf
          target: /opt/transit-tracker

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_TAG: ${{ github.sha }}
          REGISTRY_OWNER: ${{ github.repository_owner }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_TAG,REGISTRY_OWNER,CERTBOT_EMAIL
          script: |
            cd /opt/transit-tracker

            # Update image tag and registry owner in .env
            if grep -q "^IMAGE_TAG=" .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$DEPLOY_TAG|" .env
            else
              echo "IMAGE_TAG=$DEPLOY_TAG" >> .env
            fi
            if grep -q "^REGISTRY_OWNER=" .env; then
              sed -i "s|^REGISTRY_OWNER=.*|REGISTRY_OWNER=$REGISTRY_OWNER|" .env
            else
              echo "REGISTRY_OWNER=$REGISTRY_OWNER" >> .env
            fi

            docker compose pull

            # Bootstrap TLS on first deploy: check for the cert inside the
            # certbot_certs volume (not the host filesystem) then run certbot in
            # standalone mode before nginx starts. Skipped on subsequent deploys.
            if ! docker compose run --rm --entrypoint /bin/sh certbot -c "test -f /etc/letsencrypt/live/www.trackthemetro.com/fullchain.pem" >/dev/null 2>&1; then
              echo "No cert found — bootstrapping Let's Encrypt certificate..."
              docker compose run --rm --publish 80:80 --entrypoint certbot certbot certonly \
                --standalone \
                -d www.trackthemetro.com -d trackthemetro.com \
                --email "$CERTBOT_EMAIL" \
                --agree-tos --no-eff-email
            fi

            docker compose up -d --remove-orphans

            # Reload nginx so it picks up any config changes and re-resolves
            # upstream container IPs after container recreation.
            docker compose restart nginx

            # Ensure pg_trgm extension exists (idempotent — safe on every deploy)
            docker exec transit-tracker-db-1 sh -c 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"'

            docker image prune -f
